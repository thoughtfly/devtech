# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html

# Site
title: DevTech Insights
subtitle: Practical engineering guides for modern developers
description: In-depth tutorials on Java, Spring Boot, AI integration, microservices, and backend engineering best practices
keywords: Java, Spring Boot, AI, microservices, backend engineering, system design
author: DevTech Team
language: en
timezone: Asia/Shanghai

# URL
url: https://thoughtfly.github.io/devtech
root: /devtech/
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :year-:month-:day-:title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: '  '
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: '  '

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: devtech

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: ''

# Sitemap
sitemap:
  path: sitemap.xml
  rel: true
  tags: false
  categories: false

# Feed / RSS
feed:
  enable: true
  type: atom
  path: atom.xml
  limit: 20
  content: true
  autodiscovery: true
  order_by: -date

# Markdown
marked:
  prependRoot: true
  postAsset: false
  enable: true
  sanitizeUrl: false
  gfm: true
  breaks: false
  pedantic: false
  anchorAlias: true
  headerIds: true
  modiyAnchors: true
  anchors:
    level: 2
    collisionSuffix: 'v'
    permalink: false
    permalinkClass: header-anchor
    permalinkSymbol: '#'
